services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "54321:5432"
    environment:
      POSTGRES_USER: ai_thesis_monitor
      POSTGRES_PASSWORD: ai_thesis_monitor
      POSTGRES_DB: ai_thesis_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_thesis_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
